name: Deploy Staging Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push to Shopify staging theme
        env:
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_API_PASSWORD || secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store "${{ secrets.SHOPIFY_STORE }}" \
            --password "$SHOPIFY_PASSWORD" \
            --theme "${{ secrets.SHOPIFY_STAGING_THEME_ID }}" \
            --nodelete \
            --json
