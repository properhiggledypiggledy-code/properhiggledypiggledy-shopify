name: Deploy Live Theme

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Resolve Shopify auth token
        env:
          SHOPIFY_STATIC_PASSWORD: ${{ secrets.SHOPIFY_API_PASSWORD || secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          if [ -n "$SHOPIFY_STATIC_PASSWORD" ]; then
            echo "SHOPIFY_PASSWORD=$SHOPIFY_STATIC_PASSWORD" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$SHOPIFY_CLIENT_ID" ] || [ -z "$SHOPIFY_CLIENT_SECRET" ]; then
            echo "Missing Shopify auth secrets. Set SHOPIFY_API_PASSWORD (or SHOPIFY_CLI_THEME_TOKEN), or set SHOPIFY_CLIENT_ID + SHOPIFY_CLIENT_SECRET."
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -sS -X POST \
            "https://${SHOPIFY_STORE}/admin/oauth/access_token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${SHOPIFY_CLIENT_ID}" \
            --data-urlencode "client_secret=${SHOPIFY_CLIENT_SECRET}")

          SHOPIFY_PASSWORD=$(node -e "const r=JSON.parse(process.argv[1]); if(!r.access_token){console.error(JSON.stringify(r)); process.exit(1)}; process.stdout.write(r.access_token);" "$TOKEN_RESPONSE")
          echo "SHOPIFY_PASSWORD=$SHOPIFY_PASSWORD" >> "$GITHUB_ENV"

      - name: Push to Shopify live theme
        run: |
          shopify theme push \
            --store "${{ secrets.SHOPIFY_STORE }}" \
            --password "$SHOPIFY_PASSWORD" \
            --theme "${{ secrets.SHOPIFY_LIVE_THEME_ID }}" \
            --allow-live \
            --nodelete \
            --json
